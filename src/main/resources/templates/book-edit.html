<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
  <meta charset="UTF-8">
  <title>LibraSoft | Kitobni Yangilash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-6">

<div th:replace="~{fragments :: header}"></div>

<div class="bg-white w-full max-w-2xl rounded-[3.5rem] shadow-2xl overflow-hidden mt-10 border border-gray-50 flex flex-col md:flex-row">

  <div class="md:w-1/3 bg-orange-500 p-10 flex flex-col items-center justify-center text-white text-center">
    <div class="relative mb-6 group">
      <img th:if="${book.imageUrl != null}" th:src="${book.imageUrl}"
           class="w-32 h-48 object-cover rounded-xl shadow-2xl border-4 border-white/20 transform -rotate-3 transition-transform group-hover:rotate-0" alt="Cover">
      <i th:if="${book.imageUrl == null}" class="fas fa-book text-8xl opacity-30"></i>
    </div>
    <h3 class="font-black text-xl leading-tight uppercase tracking-tighter" th:text="${book.title}"></h3>
    <p class="text-orange-100 text-[10px] mt-4 font-black bg-black/20 px-4 py-1 rounded-full uppercase tracking-widest" th:text="'ID: #' + ${book.id}"></p>
  </div>

  <div class="md:w-2/3 p-12">
    <div class="mb-8">
      <h2 class="text-3xl font-black text-gray-800 tracking-tighter uppercase">Tahrirlash</h2>
      <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">Ma'lumotlarni yangilang</p>
    </div>

    <form th:action="@{/book/edit/{id}(id=${book.id})}" method="post" class="space-y-6">

      <div class="relative">
        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Kitob nomi</label>
        <div class="relative">
          <i class="fas fa-heading absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
          <input type="text" name="title" th:value="${book.title}" required
                 class="w-full pl-12 pr-6 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold text-gray-700 focus:border-orange-500 focus:bg-white transition-all shadow-sm">
        </div>
      </div>

      <div>
        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 tracking-widest">Muqova URL manzili</label>
        <div class="relative">
          <i class="fas fa-link absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
          <input type="text" name="imageUrl" th:value="${book.imageUrl}"
                 class="w-full pl-12 pr-6 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold text-gray-700 focus:border-orange-500 focus:bg-white transition-all shadow-sm">
        </div>
      </div>

      <div>
        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 tracking-widest">Mavjud nusxalar soni</label>
        <div class="relative">
          <i class="fas fa-cubes absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
          <input type="number" name="count" th:value="${book.count}" min="0" required
                 class="w-full pl-12 pr-6 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-black text-gray-700 focus:border-orange-500 focus:bg-white transition-all shadow-sm">
        </div>
      </div>

      <div class="flex items-center gap-4 pt-6">
        <a th:href="@{/book}" class="w-1/3 text-center text-gray-400 font-black py-4 uppercase text-[10px] hover:text-orange-500 transition-colors tracking-widest">
          <i class="fas fa-chevron-left mr-1"></i> Bekor qilish
        </a>
        <button type="submit" class="w-2/3 bg-gray-900 hover:bg-orange-600 text-white py-5 rounded-2xl font-black shadow-xl transition-all transform hover:-translate-y-1 active:scale-95 uppercase tracking-[0.2em] text-xs">
          O'zgarishlarni saqlash
        </button>
      </div>
    </form>
  </div>
</div>

</body>
</html>
