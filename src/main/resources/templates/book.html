<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <title>LibraSoft | Kitoblar Fondi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

<div th:replace="~{fragments :: header}"></div>

<div class="container mx-auto px-4 py-10">
    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 class="text-5xl font-black text-gray-900 tracking-tighter uppercase italic">Kitoblar <span class="text-orange-500 underline decoration-gray-200">Fondi</span></h1>
            <p class="text-gray-400 font-medium mt-2 flex items-center gap-2">
                <i class="fas fa-info-circle text-orange-400"></i>
                Kutubxonadagi barcha kitoblar va ularning real qoldig'i
            </p>
        </div>
        <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
           th:href="@{/book/add}" class="group bg-orange-500 hover:bg-orange-600 text-white font-black px-8 py-5 rounded-[2rem] shadow-2xl shadow-orange-200 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center gap-3 uppercase tracking-widest">
            <span class="bg-white/20 p-2 rounded-full group-hover:rotate-90 transition-transform"><i class="fas fa-plus"></i></span>
            Yangi kitob qo'shish
        </a>
    </div>

    <div class="bg-white rounded-[3rem] shadow-2xl shadow-gray-200/50 overflow-hidden border border-gray-100">
        <table class="min-w-full">
            <thead class="bg-gray-900">
            <tr>
                <th class="px-8 py-6 text-left text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Muqova</th>
                <th class="px-8 py-6 text-left text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Kitob Tafsilotlari</th>
                <th class="px-8 py-6 text-center text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Holat & Qoldiq</th>
                <th class="px-8 py-6 text-center text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Boshqaruv</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
            <tr th:each="book : ${bookDTOList}"
                th:classappend="${book.count <= 0 ? 'bg-gray-50/80' : 'hover:bg-orange-50/40'}"
                class="transition-all duration-300 group">

                <td class="px-8 py-6">
                    <div class="relative inline-block">
                        <img th:if="${book.imageUrl != null}" th:src="${book.imageUrl}"
                             class="w-24 h-36 object-cover rounded-2xl shadow-xl group-hover:scale-105 transition-transform duration-500 z-10 relative" alt="Book Cover">
                        <div th:if="${book.imageUrl == null}" class="w-24 h-36 bg-gray-200 rounded-2xl flex items-center justify-center text-gray-400 border-2 border-dashed border-gray-300">
                            <i class="fas fa-book-open text-3xl"></i>
                        </div>
                        <div th:if="${book.count <= 0}" class="absolute inset-0 bg-black/50 z-20 rounded-2xl flex items-center justify-center">
                            <span class="text-white text-[10px] font-black bg-red-600 px-2 py-1 rounded rotate-12">TUGAGAN</span>
                        </div>
                    </div>
                </td>

                <td class="px-8 py-6">
                    <div class="flex flex-col">
                        <span class="text-xl font-black text-gray-900 group-hover:text-orange-600 transition-colors" th:text="${book.title}"></span>
                        <div class="flex items-center mt-2 text-gray-400">
                            <div class="w-6 h-[2px] bg-orange-400 mr-3"></div>
                            <span class="text-xs font-black uppercase tracking-widest" th:text="${book.authorName}"></span>
                        </div>
                    </div>
                </td>

                <td class="px-8 py-6 text-center">
                    <div class="inline-flex flex-col items-center">
                        <div th:classappend="${book.count <= 0 ? 'border-red-200 text-red-600' : (book.count < 3 ? 'border-amber-200 text-amber-600' : 'border-emerald-200 text-emerald-600')}"
                             class="px-6 py-2 rounded-full border-2 font-black text-sm shadow-sm bg-white mb-2">
                            <span th:text="${book.count}"></span> <span class="text-[10px] ml-1">DONA</span>
                        </div>
                        <span th:if="${book.count > 0}" class="text-[9px] font-black text-emerald-500 uppercase tracking-tighter italic">Sotuvda mavjud</span>
                        <span th:if="${book.count <= 0}" class="text-[9px] font-black text-red-400 uppercase tracking-tighter italic">Kutish rejimida</span>
                    </div>
                </td>

                <td class="px-8 py-6 text-center">
                    <div class="flex items-center justify-center gap-3">
                        <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                           th:href="@{/book/edit/{id}(id=${book.id})}"
                           class="w-12 h-12 flex items-center justify-center rounded-2xl bg-orange-100 text-orange-600 hover:bg-orange-500 hover:text-white transition-all shadow-sm hover:shadow-orange-200">
                            <i class="fas fa-edit"></i>
                        </a>

                        <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                           th:href="@{/book/delete/{id}(id=${book.id})}"
                           class="w-12 h-12 flex items-center justify-center rounded-2xl bg-rose-100 text-rose-600 hover:bg-rose-500 hover:text-white transition-all shadow-sm"
                           onclick="return confirm('Haqiqatdan ham ushbu kitobni o‘chirmoqchimisiz?')">
                            <i class="fas fa-trash-alt"></i>
                        </a>

                        <a th:if="${book.count > 0}" th:href="@{/borrow}"
                           class="w-12 h-12 flex items-center justify-center rounded-2xl bg-indigo-100 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all shadow-sm"
                           title="Ijaraga berish">
                            <i class="fas fa-share-square"></i>
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
