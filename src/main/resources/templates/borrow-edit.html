<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <title>LibraSoft | Ijarani Yangilash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
<div th:replace="~{fragments :: header}"></div>

<div class="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl overflow-hidden mt-10">
    <div th:classappend="${borrow.returnDate != null ? 'bg-emerald-600' : 'bg-indigo-600'}" class="px-10 py-10 text-white text-center transition-colors">
        <h2 class="text-3xl font-black uppercase tracking-tighter" th:text="${borrow.returnDate == null ? 'Ijarani yangilash' : 'Ijara yopilgan'}"></h2>
        <p class="text-xs mt-2 font-mono" th:text="'ID: #' + ${borrow.id}"></p>
    </div>

    <form th:action="@{/borrow/edit/{id}(id=${borrow.id})}" method="post" class="p-10 space-y-6">
        <input type="hidden" name="userId" th:value="${borrow.userId}">
        <input type="hidden" name="bookId" th:value="${borrow.bookId}">

        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase mb-2">Kitob & Kitobxon</label>
            <div class="w-full px-5 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold text-gray-500">
                <span th:each="b : ${books}" th:if="${b.id == borrow.bookId}" th:text="${b.title}"></span> /
                <span th:each="u : ${users}" th:if="${u.id == borrow.userId}" th:text="${u.fullName}"></span>
            </div>
        </div>

        <div class="p-6 rounded-[2rem] border-2" th:classappend="${borrow.returnDate != null ? 'bg-emerald-50 border-emerald-100' : 'bg-indigo-50 border-indigo-100'}">
            <label class="block text-[10px] font-black uppercase mb-3 ml-1 tracking-widest">Qaytarish vaqti</label>

            <input th:if="${borrow.returnDate == null}" type="datetime-local" name="returnDate" required
                   class="w-full px-4 py-4 bg-white border-2 border-indigo-200 focus:border-indigo-500 rounded-2xl outline-none font-black text-indigo-700 shadow-sm transition-all">

            <div th:if="${borrow.returnDate != null}" class="w-full px-5 py-4 bg-white border-2 border-emerald-200 rounded-2xl font-black text-emerald-600 flex justify-between">
                <span th:text="${#temporals.format(borrow.returnDate, 'dd.MM.yyyy HH:mm')}"></span>
                <i class="fas fa-lock"></i>
            </div>
        </div>

        <div class="flex items-center gap-6 pt-4">
            <a th:href="@{/borrow}" class="w-1/3 text-center text-gray-400 font-black py-4 uppercase text-[10px] tracking-widest">ORQAGA</a>
            <button th:if="${borrow.returnDate == null}" type="submit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-2xl font-black shadow-xl uppercase tracking-widest transition transform hover:-translate-y-1">TASDIQLASH</button>
            <div th:if="${borrow.returnDate != null}" class="w-2/3 bg-emerald-100 text-emerald-600 py-5 rounded-2xl font-black text-center text-xs uppercase tracking-widest">Yopilgan</div>
        </div>
    </form>
</div>
</body>
</html>
