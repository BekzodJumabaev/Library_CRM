<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <title>LibraSoft | Ijaralar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

<div th:replace="~{fragments :: header}"></div>

<div class="container mx-auto px-4 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-100 sticky top-24">
                <h2 class="text-xl font-black text-gray-800 mb-6 tracking-tight italic uppercase text-center">Yangi Ijara</h2>
                <form th:action="@{/borrow/add}" method="post" class="space-y-4">

                    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 tracking-widest text-center">Kitobxon</label>
                        <select name="userId" required class="w-full p-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold focus:ring-2 ring-indigo-100 transition-all">
                            <option value="" disabled selected>Tanlang...</option>
                            <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName}"></option>
                        </select>
                    </div>

                    <input th:if="${#authorization.expression('hasRole(''LIBRARIAN'')')}"
                           type="hidden" name="userId" th:value="${#authentication.principal.id}">

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 tracking-widest text-center">Kitob</label>
                        <select name="bookId" required class="w-full p-3.5 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold focus:ring-2 ring-indigo-100 transition-all">
                            <option value="" disabled selected>Kitobni tanlang...</option>
                            <option th:each="b : ${books}" th:if="${b.count > 0}" th:value="${b.id}" th:text="${b.title}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 tracking-widest text-center">Muddati</label>
                        <input type="date" name="deadline" required class="w-full p-3.5 bg-gray-50 border border-gray-100 rounded-2xl font-bold text-gray-600 outline-none focus:ring-2 ring-indigo-100">
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition active:scale-95 uppercase tracking-widest text-xs">TASDIQLASH</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-gray-100 min-h-[500px]">
                <table th:if="${not #lists.isEmpty(borrowList)}" class="min-w-full border-collapse">
                    <thead class="bg-gray-900 text-white">
                    <tr>
                        <th class="px-8 py-6 text-left text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 border-b border-gray-800">Kitob & Kitobxon</th>
                        <th class="px-8 py-6 text-left text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 border-b border-gray-800">Vaqt Ko'rsatkichlari</th>
                        <th class="px-8 py-6 text-center text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 border-b border-gray-800">Amallar</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                    <tr th:each="br : ${borrowList}" class="hover:bg-indigo-50/40 transition-all group">
                        <td class="px-8 py-6">
                            <div class="flex flex-col">
                                <span class="text-lg font-black text-gray-900 group-hover:text-indigo-600 transition-colors"
                                      th:each="b : ${books}" th:if="${b.id == br.bookId}" th:text="${b.title}"></span>
                                <span class="text-[10px] font-bold text-gray-400 uppercase mt-1 tracking-widest"
                                      th:each="u : ${users}" th:if="${u.id == br.userId}" th:text="${u.fullName}"></span>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <div class="flex flex-col gap-1.5">
                                <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">OLINDI:
                                    <span class="text-gray-800 ml-1" th:text="${#temporals.format(br.borrowDate, 'dd.MM.yyyy')}"></span>
                                </span>
                                <span th:if="${br.returnDate == null}" class="text-[10px] font-black text-orange-500 uppercase tracking-tighter italic">MUDDAT:
                                    <span th:text="${#temporals.format(br.deadline, 'dd.MM.yyyy')}"></span>
                                </span>
                                <span th:if="${br.returnDate != null}" class="text-[10px] font-black text-emerald-500 uppercase tracking-tighter italic">QAYTDI:
                                    <span th:text="${#temporals.format(br.returnDate, 'dd.MM.yyyy')}"></span>
                                </span>
                            </div>
                        </td>
                        <td class="px-8 py-6 text-center">
                            <div th:if="${br.returnDate == null}">
                                <a th:href="@{/borrow/edit/{id}(id=${br.id})}"
                                   class="px-6 py-2.5 bg-rose-50 text-rose-600 border border-rose-100 rounded-full text-[10px] font-black uppercase hover:bg-rose-600 hover:text-white transition-all shadow-sm inline-block">
                                    QAYTARISH
                                </a>
                            </div>
                            <div th:if="${br.returnDate != null}">
                                <span class="px-6 py-2.5 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-full text-[10px] font-black uppercase opacity-70 inline-block">
                                    QAYTARILGAN
                                </span>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div th:if="${#lists.isEmpty(borrowList)}" class="p-20 text-center">
                    <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-dashed border-gray-100">
                        <i class="fas fa-receipt text-gray-200 text-4xl"></i>
                    </div>
                    <h2 class="text-2xl font-black text-gray-800 uppercase italic">Ijaralar mavjud emas</h2>
                    <p class="text-gray-400 mt-2 text-sm">Hozircha tizimda hech qanday ijara ma'lumoti topilmadi.</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
