<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="header" class="bg-white shadow-xl border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20">
            <div class="flex items-center space-x-10">
                <div class="flex items-center group cursor-pointer">
                    <div class="bg-gradient-to-br from-indigo-600 to-purple-700 p-2.5 rounded-2xl shadow-lg shadow-indigo-200 group-hover:scale-110 transition-transform duration-300">
                        <i class="fas fa-book-reader text-white text-xl"></i>
                    </div>
                    <span class="ml-3 text-2xl font-black text-gray-800 tracking-tighter uppercase">Libra<span class="text-indigo-600">Soft</span></span>
                </div>

                <div class="hidden md:flex items-center space-x-2" th:if="${#authentication != null}">
                    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                       th:href="@{/borrow}" class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-black text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition-all duration-300">
                        <i class="fas fa-exchange-alt"></i> IJARALAR
                    </a>

                    <a th:if="${#authorization.expression('hasRole(''LIBRARIAN'')')}"
                       th:href="@{/borrow}" class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-black text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 transition-all duration-300">
                        <i class="fas fa-history"></i> MENING IJARALARIM
                    </a>

                    <a th:href="@{/book}" class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-black text-gray-500 hover:bg-orange-50 hover:text-orange-600 transition-all duration-300">
                        <i class="fas fa-book"></i> KITOBLAR
                    </a>

                    <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                       th:href="@{/user}" class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-black text-gray-500 hover:bg-green-50 hover:text-green-600 transition-all duration-300">
                        <i class="fas fa-users"></i> USERLAR
                    </a>

                    <a th:href="@{/author}" class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-black text-gray-500 hover:bg-pink-50 hover:text-pink-600 transition-all duration-300">
                        <i class="fas fa-pen-nib"></i> MUALLIFLAR
                    </a>
                </div>
            </div>

            <div class="flex items-center gap-6" th:if="${#authentication != null}">
                <div class="text-right hidden lg:block">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest leading-none"
                       th:text="${#authentication.principal.role}">ROL</p>
                    <p class="text-sm font-bold text-gray-700" th:text="${#authentication.principal.fullName}">Ism</p>
                </div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black hover:bg-red-500 hover:text-white transition-all">
                        CHIQISH
                    </button>
                </form>
                <div class="h-12 w-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center text-white font-black shadow-lg shadow-indigo-100 border-2 border-white uppercase"
                     th:text="${#strings.substring(#authentication.principal.fullName, 0, 1)}">
                </div>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
