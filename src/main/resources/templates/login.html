<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <title>LibraSoft | Kirish va Ro'yxatdan o'tish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full">
    <div class="flex justify-center mb-8">
        <div class="flex items-center group">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 p-3 rounded-2xl shadow-xl shadow-indigo-200">
                <i class="fas fa-book-reader text-white text-2xl"></i>
            </div>
            <span class="ml-3 text-3xl font-black text-gray-800 tracking-tighter uppercase">Libra<span class="text-indigo-600">Soft</span></span>
        </div>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-gray-200/50 p-10 border border-gray-100 relative overflow-hidden">

        <div th:if="${param.error}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-xl flex items-center gap-3 animate-bounce">
            <i class="fas fa-exclamation-circle text-red-500"></i>
            <span class="text-red-700 text-[10px] font-black uppercase tracking-wider">Login yoki parol xato!</span>
        </div>

        <div id="loginForm">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-gray-900 tracking-tight">Xush kelibsiz!</h2>
                <p class="text-gray-400 text-sm mt-2 font-medium">Tizimga kirish uchun ma'lumotlarni kiriting</p>
            </div>

            <form th:action="@{/user/login}" method="post" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 tracking-[0.2em]">Foydalanuvchi nomi</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="text" name="username" required
                               class="w-full pl-12 pr-6 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold text-gray-700 focus:border-indigo-500 focus:bg-white transition-all shadow-sm"
                               placeholder="admin">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 tracking-[0.2em]">Maxfiy kod</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="password" name="password" required
                               class="w-full pl-12 pr-6 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none font-bold text-gray-700 focus:border-indigo-500 focus:bg-white transition-all shadow-sm"
                               placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 transition-all transform hover:-translate-y-1 active:scale-95 uppercase tracking-[0.2em] text-xs">
                    KIRISH <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-400 text-sm font-medium">Akkountingiz yo'qmi?
                    <button onclick="toggleForms()" class="text-indigo-600 font-black hover:underline focus:outline-none">Ro'yxatdan o'tish</button>
                </p>
            </div>
        </div>

        <div id="registerForm" class="hidden">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-gray-900 tracking-tight">Ro'yxatdan o'tish</h2>
                <p class="text-gray-400 text-sm mt-2 font-medium">Yangi profil yaratish uchun to'ldiring</p>
            </div>

            <form th:action="@{/user/add}" method="post" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 tracking-[0.2em]">To'liq ism</label>
                    <input type="text" name="fullName" required
                           class="w-full px-6 py-3 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none font-bold text-gray-700 focus:border-indigo-500 focus:bg-white transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 tracking-[0.2em]">Username</label>
                        <input type="text" name="username" required
                               class="w-full px-6 py-3 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none font-bold text-gray-700 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 tracking-[0.2em]">Telefon</label>
                        <input type="text" name="phone" placeholder="+998"
                               class="w-full px-6 py-3 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none font-bold text-gray-700 focus:border-indigo-500">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 tracking-[0.2em]">Parol</label>
                    <input type="password" name="password" required
                           class="w-full px-6 py-3 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none font-bold text-gray-700 focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1 tracking-[0.2em]">Rol tanlang</label>
                    <select name="role" class="w-full px-6 py-3 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none font-bold text-indigo-600 appearance-none">
                        <option value="LIBRARIAN">LIBRARIAN (Kutubxonachi)</option>
                        <option value="ADMIN">ADMIN (Admin)</option>
                    </select>
                </div>

                <button type="submit"
                        class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-emerald-100 transition-all transform hover:-translate-y-1 uppercase tracking-[0.2em] text-xs">
                    SAQLASH <i class="fas fa-user-plus ml-2"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-400 text-sm font-medium">Akkountingiz bormi?
                    <button onclick="toggleForms()" class="text-indigo-600 font-black hover:underline focus:outline-none">Kirish</button>
                </p>
            </div>
        </div>
    </div>

    <p class="text-center mt-8 text-gray-400 text-[10px] font-bold tracking-widest uppercase">
        &copy; 2026 LibraSoft | Barcha huquqlar himoyalangan
    </p>
</div>

<script>
    function toggleForms() {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginForm.classList.toggle('hidden');
        registerForm.classList.toggle('hidden');
    }
</script>

</body>
</html>
